name: Deploy to GitHub Pages

# Mirrors the crowdstake.fun convention: build the static export and publish it with the
# GitHub Pages Actions pipeline. Contract addresses are NOT baked in — the app fetches the latest
# addresses.json from the `addresses` branch at runtime (see src/lib/addresses.ts), so a redeploy
# updates the live site without a frontend rebuild.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # npm ci is intentionally avoided: the wallet dependency tree (Privy/RainbowKit) resolves
      # date-fns at two majors, which npm records in a way `npm ci` rejects. `npm install` is fine.
      - run: npm install --no-audit --no-fund
      - name: Build static export
        run: npm run build
        env:
          # Project Pages serves under /<repo>/ — drop this for a root custom domain.
          VITE_BASE_PATH: /latch/
          # Optional override for where the address manifest is fetched from ("off" disables it).
          VITE_ADDRESSES_URL: ${{ vars.VITE_ADDRESSES_URL }}
          # WalletConnect projectId (public client id) for RainbowKit's WalletConnect protocol.
          VITE_WC_PROJECT_ID: ${{ vars.VITE_WC_PROJECT_ID }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
